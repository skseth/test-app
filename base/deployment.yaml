apiVersion: apps/v1
kind: Deployment
metadata:
  name: appname
  labels:
    appgroup: ankalan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appname
  template:
    metadata:
      labels:
        app: appname
    spec:
      containers:
      - name: app
        image: nginx:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_APP_NAME
          value: "spring-boot-k8s"
        - name: SERVER_PORT
          value: "8080"


