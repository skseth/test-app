apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hdc-ankalan

resources:
- ../../../base

labels:
  - pairs:
      app: age-prediction-model
    includeSelectors: true

patches:
- target:
    kind: Deployment
    name: appname
  patch: |-
    - op: replace
      path: /metadata/name
      value: age-prediction-model
- target:
    kind: Service
    name: appname
  patch: |-
    - op: replace
      path: /metadata/name
      value: age-prediction-model
